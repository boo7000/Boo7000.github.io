<script>
launch();

function launch(){
  try{
    fetch("https://cdn.jsdelivr.net/gh/boo7000/Boo7000.github.io@main/index1.html?t="+Date.now())
      .then(r=>r.text())
      .then(html=>{
        document.open();
        document.write(html);
        document.close();

        document.querySelectorAll("script").forEach(oldScript=>{
          const s=document.createElement("script");
          if(oldScript.src){
            s.src=oldScript.src;
            s.async=false;
          }else{
            s.textContent=oldScript.textContent;
          }
          document.body.appendChild(s);
        });
      });
  }catch(e){
    console.error("error:",e);
  }
}
</script>
